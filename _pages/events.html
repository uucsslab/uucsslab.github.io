---
title: "News"
layout: default
sitemap: false
permalink: /news.html
---
<h1>{{page.title}}</h1>

<ul class="list-unstyled">
    {% for article in site.data.events %}
        <li class="media">
            <div class="media-body">
            <h4 class="mt-0 mb-1">{{ article.title }}</h4>
            <p><small>{{ article.date }}</small></p>
            <a href="{{ article.url }}">Link</a>
            </div>
        </li>
    {% endfor %}
</ul>
